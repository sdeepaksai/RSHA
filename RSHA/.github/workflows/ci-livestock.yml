name: Livestock Service CI

on:
  push:
    paths:
      - "services/livestock-service/**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd services/livestock-service
          npm install

      - name: Build
        run: |
          cd services/livestock-service
          npm run build

      - name: Run tests
        run: |
          cd services/livestock-service
          npm test || echo "No tests yet"
