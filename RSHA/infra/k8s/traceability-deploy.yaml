apiVersion: apps/v1
kind: Deployment
metadata:
  name: traceability-service
  namespace: rsha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: traceability-service
  template:
    metadata:
      labels:
        app: traceability-service
    spec:
      containers:
        - name: traceability-service
          image: sdeepaksai/traceability-service:1.0.0
          ports:
            - containerPort: 3001
          env:
            - name: DB_HOST
              value: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: traceability-service
  namespace: rsha
spec:
  selector:
    app: traceability-service
  ports:
    - port: 80
      targetPort: 3001
