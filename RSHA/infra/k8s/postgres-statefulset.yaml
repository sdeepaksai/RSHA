apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: rsha
data:
  POSTGRES_DB: rsha_db
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: rsha
type: Opaque
stringData:
  POSTGRES_USER: rsha_user
  POSTGRES_PASSWORD: rsha_password_change_me
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: rsha
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        envFrom:
        - configMapRef:
            name: postgres-config
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: rsha
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
