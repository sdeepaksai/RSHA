version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: rsha-postgres
    environment:
      POSTGRES_USER: rfid
      POSTGRES_PASSWORD: rfid
      POSTGRES_DB: rfid_livestock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  livestock-service:
    build: ./services/livestock-service
    container_name: rsha-livestock
    environment:
      DB_HOST: postgres
      DB_USER: rfid
      DB_PASS: rfid
      DB_NAME: rfid_livestock
    depends_on:
      - postgres
    ports:
      - "3001:3001"

  traceability-service:
    build: ./services/traceability-service
    container_name: rsha-traceability
    environment:
      DB_HOST: postgres
      DB_USER: rfid
      DB_PASS: rfid
      DB_NAME: rfid_livestock
    depends_on:
      - postgres
    ports:
      - "3002:3002"

  rfid-adapter:
    build: ./services/rfid-adapter
    container_name: rsha-rfid-adapter
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      - kafka
    ports:
      - "3003:3003"

  api-gateway:
    image: nginx:stable
    container_name: rsha-api-gateway
    volumes:
      - ./infra/api-gateway/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:8080"
    depends_on:
      - livestock-service
      - traceability-service
      - rfid-adapter

volumes:
  postgres_data:
